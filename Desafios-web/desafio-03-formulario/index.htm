<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CodeAcademy - Cadastro</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="header">

  </header>

  <main class="container">

    <section class="card">
      <form id="registerForm">
        <div class="form-group">
          <label for="name">Nome Completo</label>
          <input 
            type="text" 
            id="name" 
            name="name" 
            placeholder="Nome Completo" 
            required 
          />
        </div>

        <div class="form-group">
          <label for="email">E-mail</label>
          <input 
            type="email" 
            id="email" 
            name="email" 
            placeholder="E-mail" 
            required 
          />
        </div>

        <div class="form-group password-box">
          <label for="password">Senha</label>
          <input 
            type="password" 
            id="password" 
            name="password" 
            placeholder="Senha" 
            minlength="6"
            required 
          />
          <button type="button" id="togglePassword" aria-label="Mostrar senha">
            👁
          </button>
        </div>

        <div class="form-group">
          <label for="birthdate">Data de Nascimento</label>
          <input 
            type="date" 
            id="birthdate" 
            name="birthdate" 
            required 
          />
        </div>

        <div class="form-group">
          <label for="gender">Sexo</label>
          <select id="gender" name="gender" required>
            <option value="">Selecione</option>
            <option value="masculino">Masculino</option>
            <option value="feminino">Feminino</option>
            <option value="outro">Outro</option>
            <option value="prefiro-nao-informar">Prefiro não informar</option>
          </select>
        </div>

        <div class="terms">
          <input type="checkbox" id="terms" name="terms" required />
          <label for="terms">Concordo com os termos e condições</label>
        </div>

        <button type="submit" class="submit-btn">
          Cadastrar-se
        </button>

        <p id="successMessage" class="success-message">
          Cadastro realizado com sucesso!
        </p>
      </form>
    </section>


  </main>

  <script src="script.js"></script>
</body>
</html>
